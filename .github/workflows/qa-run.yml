name: QA Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Build & test — runs on every push/PR
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  # QA scripts — only on manual dispatch (requires SUPABASE_SERVICE_KEY)
  qa:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Fix bad questions (deactivate duplicates + short prompts)
        run: node scripts/fix-bad-questions.mjs
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Fix letter bias
        run: node scripts/fix-letter-bias.mjs
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: QA Parte 1 - Validação de questões
        run: node scripts/qa-parte1-questoes.mjs
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: QA Parte 2 - Seed users
        run: |
          if [ -f scripts/qa-parte2-seed.mjs ]; then
            node scripts/qa-parte2-seed.mjs
          else
            echo "qa-parte2-seed.mjs not found, skipping"
          fi
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: QA Parte 3 - Smoke tests
        run: |
          if [ -f scripts/qa-parte3-tests.mjs ]; then
            node scripts/qa-parte3-tests.mjs
          else
            echo "qa-parte3-tests.mjs not found, skipping"
          fi
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
