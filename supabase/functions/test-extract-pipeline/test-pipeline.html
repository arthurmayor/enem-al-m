<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Teste Pipeline — test-extract-pipeline</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.3rem; }
    .row { margin: 1rem 0; }
    label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
    input[type="text"], input[type="number"] { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    input[type="text"].wide { width: 100%; }
    input[type="file"] { padding: 0.5rem 0; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
    .status { padding: 0.75rem; border-radius: 4px; margin: 0.5rem 0; }
    .status.loading { background: #fff4d6; border: 1px solid #e6c200; }
    .status.error { background: #fde2e2; border: 1px solid #c53030; color: #742a2a; }
    .status.ok { background: #dcfce7; border: 1px solid #166534; color: #14532d; }
    pre { background: #f7f7f7; border: 1px solid #ddd; padding: 0.75rem; overflow: auto; max-height: 420px; font-size: 0.85rem; white-space: pre-wrap; word-break: break-word; }
    button { padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 4px; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .meta { color: #555; font-size: 0.9rem; }
    .card { border: 1px solid #e0e0e0; border-radius: 6px; padding: 1rem; margin-top: 1rem; }
    .kvs { display: grid; grid-template-columns: max-content 1fr; gap: 0.25rem 1rem; font-size: 0.95rem; }
    .kvs dt { font-weight: 600; color: #555; }
    code { background: #f0f0f0; padding: 0 0.25rem; border-radius: 2px; }
  </style>
</head>
<body>
  <h1>Pipeline de extração — upload + trigger</h1>
  <p class="meta">Endpoint: <code>https://nbfgqrjcrzgrprzqedtl.supabase.co/functions/v1/test-extract-pipeline</code></p>

  <div class="row">
    <label for="apikey">Anon key (salva no localStorage)</label>
    <input type="text" id="apikey" class="wide" placeholder="eyJhbGciOi..." autocomplete="off" />
    <p class="meta">Cole a anon key do projeto. Pegue em Settings → API no dashboard do Supabase.</p>
  </div>

  <form id="form">
    <div class="row grid">
      <div>
        <label for="banca">banca</label>
        <input type="text" id="banca" name="banca" value="Fuvest" required />
      </div>
      <div>
        <label for="ano">ano</label>
        <input type="number" id="ano" name="ano" value="2025" required />
      </div>
      <div>
        <label for="fase">fase</label>
        <input type="text" id="fase" name="fase" value="1" />
      </div>
      <div>
        <label for="versao">versão</label>
        <input type="text" id="versao" name="versao" value="V1" />
      </div>
    </div>

    <div class="row">
      <label for="prova">PDF da prova (obrigatório)</label>
      <input type="file" id="prova" name="prova" accept="application/pdf" required />
    </div>

    <div class="row">
      <label for="gabarito">PDF do gabarito (opcional)</label>
      <input type="file" id="gabarito" name="gabarito" accept="application/pdf" />
    </div>

    <button type="submit" id="submitBtn">Rodar pipeline</button>
  </form>

  <div id="output"></div>

  <script>
    const ENDPOINT = "https://nbfgqrjcrzgrprzqedtl.supabase.co/functions/v1/test-extract-pipeline";
    const apikeyInput = document.getElementById("apikey");
    const form = document.getElementById("form");
    const submitBtn = document.getElementById("submitBtn");
    const output = document.getElementById("output");

    apikeyInput.value = localStorage.getItem("supabase_anon_key") || "";
    apikeyInput.addEventListener("input", () => {
      localStorage.setItem("supabase_anon_key", apikeyInput.value.trim());
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;

      const fd = new FormData(form);
      const provaFile = fd.get("prova");
      if (!(provaFile instanceof File) || !provaFile.size) {
        output.innerHTML = '<div class="status error">Selecione um PDF de prova.</div>';
        submitBtn.disabled = false;
        return;
      }

      output.innerHTML = '<div class="status loading">Upload + profiling em andamento — isso pode levar 30s+ (chama Claude API).</div>';

      const headers = {};
      const apikey = apikeyInput.value.trim();
      if (apikey) {
        headers["apikey"] = apikey;
        headers["Authorization"] = "Bearer " + apikey;
      }

      const started = performance.now();
      try {
        const res = await fetch(ENDPOINT, { method: "POST", body: fd, headers });
        const elapsed = ((performance.now() - started) / 1000).toFixed(1);
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = null; }

        if (!res.ok) {
          output.innerHTML =
            '<div class="status error"><strong>HTTP ' + res.status + '</strong> em ' + elapsed + 's</div>' +
            '<pre>' + escapeHtml(text) + '</pre>';
          return;
        }
        if (!data) {
          output.innerHTML = '<div class="status error">Resposta não-JSON:</div><pre>' + escapeHtml(text) + '</pre>';
          return;
        }
        render(data, elapsed);
      } catch (err) {
        output.innerHTML = '<div class="status error">Erro de rede: ' + escapeHtml(err.message || String(err)) + '</div>';
      } finally {
        submitBtn.disabled = false;
      }
    });

    function render(data, elapsed) {
      const ex = data.extract || {};
      const profile = ex.profile || {};
      const statusClass = (ex.status === "pending" && ex.current_stage === "profiling_done") ? "ok" : "error";
      const statusText = ex.status === "pending" && ex.current_stage === "profiling_done"
        ? "OK — pipeline pausou em profiling_done"
        : "status: " + (ex.status || "?");

      output.innerHTML =
        '<div class="status ' + statusClass + '">' + statusText + ' (total ' + elapsed + 's)</div>' +
        '<div class="card">' +
          '<dl class="kvs">' +
            '<dt>exam_id</dt><dd><code>' + escapeHtml(data.exam_id || "") + '</code></dd>' +
            '<dt>job_id</dt><dd><code>' + escapeHtml(ex.job_id || "") + '</code></dd>' +
            '<dt>current_stage</dt><dd>' + escapeHtml(ex.current_stage || "") + '</dd>' +
            '<dt>total_pages</dt><dd>' + (ex.total_pages ?? "?") + '</dd>' +
            '<dt>total_chars</dt><dd>' + (ex.total_chars ?? "?") + '</dd>' +
            '<dt>banca · ano · fase · versão</dt><dd>' +
              escapeHtml(profile.banca || "?") + ' · ' + (profile.ano ?? "?") + ' · ' +
              escapeHtml(profile.versao || "?") + ' · fase ' + escapeHtml(String(profile.fase ?? "")) +
            '</dd>' +
            '<dt>source_type</dt><dd>' + escapeHtml(profile.source_type || "?") + '</dd>' +
            '<dt>objective_question_count</dt><dd>' + (profile.objective_question_count ?? "?") + '</dd>' +
            '<dt>has_images</dt><dd>' + String(profile.has_images ?? "?") + '</dd>' +
            '<dt>has_shared_context</dt><dd>' + String(profile.has_shared_context ?? "?") + '</dd>' +
            '<dt>has_note_e_adote</dt><dd>' + String(profile.has_note_e_adote ?? "?") + '</dd>' +
          '</dl>' +
          '<h3>Upload</h3>' +
          '<pre>' + escapeHtml(JSON.stringify(data.uploaded || {}, null, 2)) + '</pre>' +
          '<h3>Profile completo</h3>' +
          '<pre>' + escapeHtml(JSON.stringify(profile, null, 2)) + '</pre>' +
          '<h3>Resposta crua do extract-exam</h3>' +
          '<pre>' + escapeHtml(JSON.stringify(ex, null, 2)) + '</pre>' +
        '</div>';
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>
