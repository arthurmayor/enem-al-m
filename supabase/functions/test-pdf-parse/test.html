<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Teste PDF Parse</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.3rem; }
    .row { margin: 1rem 0; }
    label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
    input[type="text"] { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    input[type="file"] { padding: 0.5rem 0; }
    .status { padding: 0.75rem; border-radius: 4px; margin: 0.5rem 0; }
    .status.loading { background: #fff4d6; border: 1px solid #e6c200; }
    .status.error { background: #fde2e2; border: 1px solid #c53030; color: #742a2a; }
    .readable-true { color: #166534; font-weight: 700; }
    .readable-false { color: #991b1b; font-weight: 700; }
    .sample-box { background: #f7f7f7; border: 1px solid #ddd; padding: 0.75rem; height: 260px; overflow: auto; white-space: pre-wrap; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 0.85rem; }
    ul.pages { max-height: 200px; overflow: auto; border: 1px solid #ddd; padding: 0.5rem 1.5rem; background: #fafafa; }
    .meta { color: #555; font-size: 0.9rem; }
    .card { border: 1px solid #e0e0e0; border-radius: 6px; padding: 1rem; margin-top: 1rem; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Teste de extração de PDF (test-pdf-parse)</h1>
  <p class="meta">Endpoint: <code>https://nbfgqrjcrzgrprzqedtl.supabase.co/functions/v1/test-pdf-parse</code></p>

  <div class="row">
    <label for="apikey">Anon key (opcional — salva no localStorage)</label>
    <input type="text" id="apikey" placeholder="eyJhbGciOi..." autocomplete="off" />
    <p class="meta">O gateway do Supabase pode exigir o header <code>apikey</code>. Se o request voltar 401, cole a anon key do projeto aqui.</p>
  </div>

  <div class="row">
    <label for="pdf">Selecione um PDF</label>
    <input type="file" id="pdf" accept="application/pdf" />
  </div>

  <div id="output"></div>

  <script>
    const ENDPOINT = "https://nbfgqrjcrzgrprzqedtl.supabase.co/functions/v1/test-pdf-parse";
    const apikeyInput = document.getElementById("apikey");
    const fileInput = document.getElementById("pdf");
    const output = document.getElementById("output");

    apikeyInput.value = localStorage.getItem("supabase_anon_key") || "";
    apikeyInput.addEventListener("input", () => {
      localStorage.setItem("supabase_anon_key", apikeyInput.value.trim());
    });

    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      output.innerHTML = '<div class="status loading">Enviando ' + escapeHtml(file.name) + ' (' + formatBytes(file.size) + ')…</div>';

      const fd = new FormData();
      fd.append("file", file);

      const headers = {};
      const apikey = apikeyInput.value.trim();
      if (apikey) {
        headers["apikey"] = apikey;
        headers["Authorization"] = "Bearer " + apikey;
      }

      const started = performance.now();
      try {
        const res = await fetch(ENDPOINT, { method: "POST", body: fd, headers });
        const elapsed = ((performance.now() - started) / 1000).toFixed(2);
        const text = await res.text();

        let data;
        try { data = JSON.parse(text); } catch { data = null; }

        if (!res.ok) {
          output.innerHTML = '<div class="status error"><strong>HTTP ' + res.status + '</strong><br>' + escapeHtml(text) + '</div>';
          return;
        }

        if (!data) {
          output.innerHTML = '<div class="status error">Resposta não-JSON: ' + escapeHtml(text.slice(0, 500)) + '</div>';
          return;
        }

        render(data, elapsed);
      } catch (err) {
        output.innerHTML = '<div class="status error">Erro de rede: ' + escapeHtml(err.message || String(err)) + '</div>';
      }
    });

    function render(data, elapsed) {
      const readableClass = data.is_readable ? "readable-true" : "readable-false";
      const readableText = data.is_readable ? "SIM (texto extraído)" : "NÃO (provavelmente escaneado)";
      const sample = (data.sample_text || "").slice(0, 500);

      const pagesList = Array.isArray(data.chars_per_page)
        ? data.chars_per_page.map((n, i) => '<li>Página ' + (i + 1) + ': ' + n + ' caracteres</li>').join("")
        : "<li>(sem dados)</li>";

      output.innerHTML =
        '<div class="card">' +
          '<p class="meta">Processado em ' + elapsed + 's</p>' +
          '<p><strong>total_pages:</strong> ' + (data.total_pages ?? "?") + '</p>' +
          '<p><strong>is_readable:</strong> <span class="' + readableClass + '">' + readableText + '</span></p>' +
          '<div>' +
            '<strong>sample_text (primeiros 500 chars):</strong>' +
            '<div class="sample-box">' + (sample ? escapeHtml(sample) : "<em>(vazio)</em>") + '</div>' +
          '</div>' +
          '<div style="margin-top:1rem">' +
            '<strong>chars_per_page:</strong>' +
            '<ul class="pages">' + pagesList + '</ul>' +
          '</div>' +
        '</div>';
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatBytes(n) {
      if (n < 1024) return n + " B";
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
      return (n / (1024 * 1024)).toFixed(1) + " MB";
    }
  </script>
</body>
</html>
